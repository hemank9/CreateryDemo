<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Createry — Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#E8EAF6;--line:rgba(160,165,210,0.32);--ink:#1A1A2E;--red:#E8000F;--yellow:#FFD600;--green:#1B6B1B;--muted:#6B6E8A;--card:rgba(255,255,255,0.85);--border:rgba(160,165,210,0.5);--orange:#E86000;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Anonymous Pro',monospace;background:var(--paper);background-image:repeating-linear-gradient(transparent,transparent 27px,var(--line) 27px,var(--line) 28px);background-size:100% 28px;min-height:100vh;color:var(--ink);}

/* HEADER */
header{background:var(--ink);color:white;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-logo{font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);}
.hdr-right{display:flex;align-items:center;gap:16px;}
.hdr-clock{font-size:13px;color:rgba(255,255,255,0.6);letter-spacing:.04em;}
.hdr-count{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.hdr-count span{background:var(--red);color:white;border-radius:2px;padding:3px 8px;margin-left:6px;}
.hdr-count span.zero{background:var(--green);}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s;}
.conn-dot.ok{background:#4caf50;}
.conn-dot.err{background:var(--red);}

/* TABS */
.tabs{display:flex;gap:0;background:rgba(26,26,46,0.06);border-bottom:2px solid var(--border);padding:0 24px;}
.tab{padding:10px 18px;font-family:'Anonymous Pro',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .12s;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab .tab-badge{display:inline-block;background:var(--red);color:white;border-radius:10px;font-size:9px;padding:1px 6px;margin-left:5px;vertical-align:middle;}
.tab .tab-badge.done{background:var(--green);}

/* MAIN */
.main{padding:20px 24px 60px;}
.empty{text-align:center;padding:60px 0;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.08em;}
.empty-icon{font-size:40px;display:block;margin-bottom:10px;}

/* TICKETS GRID */
.tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

/* TICKET */
.ticket{background:var(--card);border:2px solid var(--border);border-radius:4px;overflow:hidden;transition:all .2s;}
.ticket.active{border-color:var(--red);animation:newPulse .6s ease;}
.ticket.making{border-color:var(--orange);}
.ticket.done{border-color:var(--green);opacity:.7;}
@keyframes newPulse{0%{transform:scale(1.02)}100%{transform:scale(1)}}

.ticket-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--line);}
.ticket-header.active{background:rgba(232,0,15,0.06);}
.ticket-header.making{background:rgba(232,96,0,0.06);}
.ticket-header.done{background:rgba(27,107,27,0.06);}

.ticket-id{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:.04em;}
.ticket-time{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.ticket-status{font-size:9px;font-weight:700;padding:4px 8px;border-radius:1px;text-transform:uppercase;letter-spacing:.08em;}
.ticket-status.active{background:var(--red);color:white;}
.ticket-status.making{background:var(--orange);color:white;}
.ticket-status.done{background:var(--green);color:white;}

.ticket-meta{padding:8px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.ticket-customer{font-size:12px;font-weight:700;color:var(--ink);}
.ticket-phone{font-size:11px;color:var(--muted);}
.ticket-slot{font-size:10px;font-weight:700;background:var(--yellow);color:var(--ink);padding:3px 8px;border-radius:1px;text-transform:uppercase;letter-spacing:.06em;}

.ticket-items{padding:10px 14px;}
.ticket-item{display:flex;align-items:flex-start;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);gap:8px;}
.ticket-item:last-child{border-bottom:none;}
.ti-left{flex:1;}
.ti-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;}
.ti-opts{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.ti-qty{font-size:15px;font-weight:700;color:var(--red);min-width:28px;text-align:right;flex-shrink:0;}

.ticket-footer{padding:10px 14px;border-top:1.5px solid var(--line);display:flex;gap:8px;}
.btn{flex:1;border:none;border-radius:2px;padding:10px;font-family:'Anonymous Pro',monospace;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;}
.btn-start{background:var(--orange);color:white;}
.btn-start:hover{background:#cc5500;}
.btn-done{background:var(--green);color:white;}
.btn-done:hover{background:#145214;}
.btn-cancel{background:rgba(160,165,210,0.2);color:var(--muted);border:1.5px solid var(--border);}
.btn-cancel:hover{background:var(--red);color:white;border-color:var(--red);}
.btn-reopen{background:rgba(160,165,210,0.2);color:var(--ink);border:1.5px solid var(--border);}
.btn-reopen:hover{background:var(--orange);color:white;border-color:var(--orange);}

/* TIMER */
.ticket-timer{font-size:11px;font-weight:700;padding:5px 14px;background:rgba(26,26,46,0.05);border-top:1px solid var(--line);text-align:center;letter-spacing:.04em;}
.ticket-timer.warn{color:var(--orange);}
.ticket-timer.late{color:var(--red);animation:blink .8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* NEW ORDER MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,0.7);z-index:400;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--paper);background-image:repeating-linear-gradient(transparent,transparent 27px,var(--line) 27px,var(--line) 28px);border:2px solid var(--border);border-radius:4px;padding:20px;width:calc(100% - 32px);max-width:460px;max-height:90vh;overflow-y:auto;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.modal-close{width:28px;height:28px;border-radius:50%;background:rgba(160,165,210,0.22);border:1px solid var(--border);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.modal-close:hover{background:var(--ink);color:white;}
.fl{margin-bottom:12px;}
.fl-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px;display:block;}
.fi{width:100%;border:1.5px solid var(--border);border-radius:2px;padding:8px 10px;font-size:13px;font-family:'Anonymous Pro',monospace;background:rgba(255,255,255,0.7);color:var(--ink);outline:none;}
.fi:focus{border-color:var(--red);}
.fi-row{display:flex;gap:8px;}

/* ITEM BUILDER */
.item-builder{border:1.5px solid var(--border);border-radius:2px;padding:12px;background:rgba(255,255,255,0.5);margin-bottom:12px;}
.ib-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.ib-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.ib-name{flex:1;border:1.5px solid var(--border);border-radius:2px;padding:7px 9px;font-size:12px;font-family:'Anonymous Pro',monospace;background:rgba(255,255,255,0.7);color:var(--ink);outline:none;}
.ib-name:focus{border-color:var(--red);}
.ib-opts{flex:1;border:1.5px solid var(--border);border-radius:2px;padding:7px 9px;font-size:12px;font-family:'Anonymous Pro',monospace;background:rgba(255,255,255,0.7);color:var(--ink);outline:none;}
.ib-opts:focus{border-color:var(--red);}
.ib-qty{width:52px;border:1.5px solid var(--border);border-radius:2px;padding:7px 6px;font-size:12px;font-family:'Anonymous Pro',monospace;text-align:center;background:rgba(255,255,255,0.7);color:var(--ink);outline:none;}
.ib-qty:focus{border-color:var(--red);}
.ib-del{width:28px;height:28px;border-radius:50%;background:none;border:1.5px solid var(--border);cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.ib-del:hover{background:var(--red);color:white;border-color:var(--red);}
.add-item-btn{width:100%;background:none;border:1.5px dashed var(--border);border-radius:2px;padding:8px;font-family:'Anonymous Pro',monospace;font-size:11px;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .12s;}
.add-item-btn:hover{border-color:var(--ink);color:var(--ink);}
.submit-btn{width:100%;background:var(--ink);color:white;border:none;border-radius:2px;padding:12px;font-family:'Anonymous Pro',monospace;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s;text-transform:uppercase;letter-spacing:.06em;}
.submit-btn:hover{background:var(--red);}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;background:var(--red);color:white;border:none;border-radius:2px;padding:13px 20px;font-family:'Anonymous Pro',monospace;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;box-shadow:0 6px 18px rgba(232,0,15,0.35);transition:all .15s;z-index:200;}
.fab:hover{background:var(--ink);transform:translateY(-2px);}

/* SOUND TOGGLE */
.sound-btn{background:none;border:1.5px solid rgba(255,255,255,0.2);border-radius:2px;padding:5px 10px;font-family:'Anonymous Pro',monospace;font-size:10px;color:rgba(255,255,255,0.6);cursor:pointer;letter-spacing:.04em;transition:all .12s;}
.sound-btn:hover{border-color:white;color:white;}
.sound-btn.on{border-color:var(--yellow);color:var(--yellow);}
</style>
</head>
<body>

<header>
  <div class="hdr-logo">Createry · Kitchen</div>
  <div class="hdr-right">
    <div class="conn-dot" id="connDot" title="connection status"></div>
    <button class="sound-btn on" id="soundBtn" onclick="toggleSound()">🔔 sound on</button>
    <div class="hdr-count">active orders <span id="activeCount">0</span></div>
    <div class="hdr-clock" id="clock"></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="active" onclick="switchTab(this)">active <span class="tab-badge" id="badge-active">0</span></button>
  <button class="tab" data-tab="making" onclick="switchTab(this)">making <span class="tab-badge" id="badge-making">0</span></button>
  <button class="tab" data-tab="done" onclick="switchTab(this)">done <span class="tab-badge done" id="badge-done">0</span></button>
</div>

<div class="main">
  <div class="tickets" id="ticketsGrid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <span class="empty-icon">✦</span>
    no orders here yet.
  </div>
</div>

<button class="fab" onclick="openNewOrder()">+ new order</button>

<!-- New Order Modal -->
<div class="overlay" id="orderModal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">new order</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="fi-row">
      <div class="fl" style="flex:1">
        <label class="fl-lbl">customer name *</label>
        <input class="fi" id="custName" placeholder="full name">
      </div>
      <div class="fl" style="flex:1">
        <label class="fl-lbl">phone</label>
        <input class="fi" id="custPhone" placeholder="+91 00000 00000">
      </div>
    </div>
    <div class="fl">
      <label class="fl-lbl">pickup slot</label>
      <select class="fi" id="custSlot">
        <option>ASAP</option>
        <option>11:00 AM</option>
        <option>11:30 AM</option>
        <option>12:00 PM</option>
        <option>12:30 PM</option>
        <option>1:00 PM</option>
      </select>
    </div>
    <div class="item-builder">
      <div class="ib-hdr">order items</div>
      <div id="itemRows"></div>
      <button class="add-item-btn" onclick="addItemRow()">+ add item</button>
    </div>
    <div id="modalErr" style="color:var(--red);font-size:11px;margin-bottom:8px;display:none;"></div>
    <button class="submit-btn" onclick="submitOrder()">create ticket →</button>
  </div>
</div>

<script>
// All orders keyed by orderId for easy lookup
let ordersMap = {};
let currentTab = 'active';
let soundOn = true;
let knownIds = new Set(); // track IDs we've seen to detect new arrivals

// ── CLOCK ──
function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// ── CONNECTION DOT ──
function setConn(ok){
  const d = document.getElementById('connDot');
  d.className = 'conn-dot ' + (ok ? 'ok' : 'err');
  d.title = ok ? 'connected' : 'connection error';
}

// ── SOUND ──
function playBeep(){
  if(!soundOn) return;
  try{
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    [0,150,300].forEach(d=>setTimeout(()=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; g.gain.setValueAtTime(.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);
      o.start(); o.stop(ctx.currentTime+.15);
    },d));
  }catch(e){}
}
function toggleSound(){
  soundOn = !soundOn;
  const b = document.getElementById('soundBtn');
  b.textContent = soundOn ? '🔔 sound on' : '🔕 sound off';
  b.classList.toggle('on', soundOn);
}

// ── FETCH FROM REDIS ──
async function fetchOrders(){
  try{
    const r = await fetch('/api/get-orders');
    if(!r.ok) throw new Error();
    const {orders} = await r.json();
    setConn(true);

    // detect new arrivals and play beep
    let hasNew = false;
    orders.forEach(o=>{
      if(!knownIds.has(o.orderId)){
        knownIds.add(o.orderId);
        // only beep if it's a new active order (not first load)
        if(knownIds.size > 1 || Object.keys(ordersMap).length > 0) hasNew = true;
      }
    });
    if(hasNew) playBeep();

    // rebuild map from server — server is source of truth
    // preserve local optimistic status only if server hasn't caught up yet
    const newMap = {};
    orders.forEach(o=>{
      const existing = ordersMap[o.orderId];
      newMap[o.orderId] = {
        ...o,
        // if we have a newer local status change in flight, keep it briefly
        status: (existing && existing._optimistic) ? existing.status : o.status,
        ts: o.createdAt,
        doneTs: o.doneAt || null,
      };
      if(existing && existing._optimistic && existing.status === o.status){
        delete newMap[o.orderId]._optimistic;
      }
    });

    // also keep done orders that server no longer returns (expired from active set)
    // so they stay visible in the "done" tab until page refresh
    Object.values(ordersMap).forEach(o=>{
      if(o.status === 'done' && !newMap[o.orderId]) newMap[o.orderId] = o;
    });

    ordersMap = newMap;
    render();
  } catch(e){
    setConn(false);
    console.warn('Poll failed:', e);
  }
}

// ── UPDATE STATUS ──
async function updateStatus(orderId, status){
  const o = ordersMap[orderId];
  if(!o) return;

  // optimistic update
  o.status = status;
  o._optimistic = true;
  if(status === 'done') o.doneAt = Date.now();
  render();

  try{
    const r = await fetch('/api/update-order',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({orderId, status})
    });
    if(r.ok) delete o._optimistic;
  }catch(e){
    console.warn('Status update failed, will retry on next poll.');
  }
}

// ── ELAPSED TIME ──
function elapsed(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'s';
  const m = Math.floor(s/60), sec = s%60;
  return m+'m '+(sec<10?'0':'')+sec+'s';
}
function timerClass(ts){
  const m = (Date.now()-ts)/60000;
  if(m>10) return 'late'; if(m>5) return 'warn'; return '';
}

// ── RENDER ──
function render(){
  const grid = document.getElementById('ticketsGrid');
  const empty = document.getElementById('emptyState');

  const all = Object.values(ordersMap);
  const filtered = all.filter(o=>
    currentTab==='active' ? o.status==='active' :
    currentTab==='making' ? o.status==='making' :
    o.status==='done'
  ).sort((a,b)=> currentTab==='done' ? (b.doneAt||0)-(a.doneAt||0) : b.ts-a.ts);

  grid.innerHTML='';
  if(!filtered.length){empty.style.display='block'; grid.style.display='none';}
  else{empty.style.display='none'; grid.style.display='grid';}

  filtered.forEach(o=>{
    const card = document.createElement('div');
    card.className = `ticket ${o.status}`;
    card.id = 'ticket-'+o.orderId;

    const timeStr = new Date(o.ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    const doneTimeStr = o.doneAt ? new Date(o.doneAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';

    const itemsHtml = o.items.map(i=>`
      <div class="ticket-item">
        <div class="ti-left">
          <div class="ti-name">${i.name}</div>
          ${i.opts ? `<div class="ti-opts">${i.opts}</div>` : ''}
        </div>
        <div class="ti-qty">×${i.qty}</div>
      </div>`).join('');

    let footerHtml = '';
    if(o.status==='active'){
      footerHtml = `<button class="btn btn-start" onclick="startOrder('${o.orderId}')">start making</button><button class="btn btn-cancel" onclick="cancelOrder('${o.orderId}')">cancel</button>`;
    } else if(o.status==='making'){
      footerHtml = `<button class="btn btn-done" onclick="doneOrder('${o.orderId}')">✓ ready for pickup</button><button class="btn btn-reopen" onclick="reopenOrder('${o.orderId}')">reopen</button>`;
    } else {
      footerHtml = `<button class="btn btn-reopen" onclick="reopenOrder('${o.orderId}')">reopen</button>`;
    }

    const timerHtml = o.status!=='done'
      ? `<div class="ticket-timer ${timerClass(o.ts)}" id="timer-${o.orderId}">⏱ waiting ${elapsed(o.ts)}</div>`
      : '';

    card.innerHTML=`
      <div class="ticket-header ${o.status}">
        <div>
          <div class="ticket-id">${o.orderId}</div>
          <div class="ticket-time">placed at ${timeStr}${o.status==='done'&&doneTimeStr?' · ready '+doneTimeStr:''}</div>
        </div>
        <div class="ticket-status ${o.status}">${o.status==='active'?'new':o.status==='making'?'making':'ready ✓'}</div>
      </div>
      <div class="ticket-meta">
        <div>
          <div class="ticket-customer">${o.name}</div>
          ${o.phone ? `<div class="ticket-phone">${o.phone}</div>` : ''}
        </div>
        <div class="ticket-slot">${o.slot}</div>
      </div>
      <div class="ticket-items">${itemsHtml}</div>
      ${timerHtml}
      <div class="ticket-footer">${footerHtml}</div>`;
    grid.appendChild(card);
  });

  // update badges
  const counts = {active:0, making:0, done:0};
  Object.values(ordersMap).forEach(o=>{ if(counts[o.status]!==undefined) counts[o.status]++; });
  document.getElementById('badge-active').textContent = counts.active;
  document.getElementById('badge-making').textContent = counts.making;
  document.getElementById('badge-done').textContent = counts.done;
  const active = counts.active + counts.making;
  const ac = document.getElementById('activeCount');
  ac.textContent = active;
  ac.className = active===0 ? 'zero' : '';
}

// update timers every second without full re-render
setInterval(()=>{
  Object.values(ordersMap).filter(o=>o.status!=='done').forEach(o=>{
    const el = document.getElementById('timer-'+o.orderId);
    if(el){ el.textContent=`⏱ waiting ${elapsed(o.ts)}`; el.className=`ticket-timer ${timerClass(o.ts)}`; }
  });
},1000);

// ── ACTIONS ──
function startOrder(id){ updateStatus(id,'making'); if(currentTab==='active') render(); else switchTabTo('making'); }
function doneOrder(id){ updateStatus(id,'done'); if(currentTab==='making') render(); else switchTabTo('done'); }
function cancelOrder(id){
  if(!confirm('Cancel this order?')) return;
  // mark done locally and tell server
  updateStatus(id,'done');
  delete ordersMap[id];
  render();
}
function reopenOrder(id){ updateStatus(id,'active'); switchTabTo('active'); }

// ── TABS ──
function switchTab(btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  render();
}
function switchTabTo(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  render();
}

// ── NEW ORDER MODAL (walk-in orders entered by kitchen staff) ──
let itemRowCount = 0;
function openNewOrder(){
  document.getElementById('custName').value='';
  document.getElementById('custPhone').value='';
  document.getElementById('custSlot').value='ASAP';
  document.getElementById('itemRows').innerHTML='';
  document.getElementById('modalErr').style.display='none';
  itemRowCount=0;
  addItemRow(); addItemRow();
  document.getElementById('orderModal').classList.add('open');
  document.getElementById('custName').focus();
}
function closeModal(){ document.getElementById('orderModal').classList.remove('open'); }
document.getElementById('orderModal').addEventListener('click',e=>{ if(e.target===document.getElementById('orderModal')) closeModal(); });

function addItemRow(){
  itemRowCount++;
  const row = document.createElement('div');
  row.className='ib-row'; row.id='irow-'+itemRowCount;
  row.innerHTML=`
    <input class="ib-name" placeholder="item name" id="iname-${itemRowCount}">
    <input class="ib-opts" placeholder="opts (eg: hazelnut)" id="iopts-${itemRowCount}">
    <input class="ib-qty" type="number" min="1" value="1" id="iqty-${itemRowCount}">
    <button class="ib-del" onclick="removeRow(${itemRowCount})">×</button>`;
  document.getElementById('itemRows').appendChild(row);
}
function removeRow(n){ const r=document.getElementById('irow-'+n); if(r) r.remove(); }

async function submitOrder(){
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const slot = document.getElementById('custSlot').value;
  const err = document.getElementById('modalErr');

  if(!name){ err.textContent='please enter customer name.'; err.style.display='block'; return; }

  const rows = document.querySelectorAll('#itemRows .ib-row');
  const items = [];
  rows.forEach(r=>{
    const id = r.id.replace('irow-','');
    const n = document.getElementById('iname-'+id)?.value.trim();
    const o = document.getElementById('iopts-'+id)?.value.trim();
    const q = parseInt(document.getElementById('iqty-'+id)?.value)||1;
    if(n) items.push({name:n, opts:o||'', qty:q, price:0});
  });

  if(!items.length){ err.textContent='please add at least one item.'; err.style.display='block'; return; }
  err.style.display='none';

  try{
    const r = await fetch('/api/save-order',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, phone, slot, items, total:0})
    });
    const data = await r.json();
    if(data.orderId){
      closeModal();
      await fetchOrders(); // refresh immediately
      switchTabTo('active');
      playBeep();
    }
  } catch(e){
    err.textContent='failed to create order. check connection.';
    err.style.display='block';
  }
}

// ── INIT ──
fetchOrders();
setInterval(fetchOrders, 4000); // poll every 4 seconds
</script>
</body>
